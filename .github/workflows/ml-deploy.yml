name: Sync ML Service to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - 'ml-service/**'
      - '.github/workflows/ml-deploy.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Hugging Face CLI
        run: pip install -U "huggingface_hub[cli]"

      - name: Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          # Use standard git to push the ml-service folder to Hugging Face
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Clone the Hugging Face space
          git clone https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME hf-space
          
          # Copy ml-service files into the cloned space
          cp -r ./ml-service/* hf-space/
          
          # Push changes
          cd hf-space
          git add .
          git commit -m "Automated deployment from GitHub Actions" || echo "No changes to commit"
          git push
