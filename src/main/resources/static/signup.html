<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentSync - Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #c8d8f0 0%, #d6e4f7 40%, #c2d8f5 100%);
            overflow: hidden;
            position: relative;
        }

        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            pointer-events: none;
            animation: blobFloat 18s ease-in-out infinite;
        }

        .blob1 {
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, #4a90d944, #2563eb33);
            top: -80px;
            left: -80px;
        }

        .blob2 {
            width: 380px;
            height: 380px;
            background: radial-gradient(circle, #3b82f644, #7c3aed33);
            bottom: -60px;
            right: -60px;
            animation-delay: 6s;
        }

        .blob3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #60a5fa33, #4a90d922);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 12s;
        }

        @keyframes blobFloat {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(40px, -40px) scale(1.08);
            }

            66% {
                transform: translate(-25px, 25px) scale(0.95);
            }
        }

        .blob3 {
            animation: blobFloat3 18s ease-in-out infinite;
            animation-delay: 12s;
        }

        @keyframes blobFloat3 {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
            }

            33% {
                transform: translate(calc(-50% + 40px), calc(-50% - 40px)) scale(1.08);
            }

            66% {
                transform: translate(calc(-50% - 25px), calc(-50% + 25px)) scale(0.95);
            }
        }

        .sparkle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 28px;
            height: 28px;
            opacity: 0.6;
            animation: sparkle 3s ease-in-out infinite;
        }

        @keyframes sparkle {

            0%,
            100% {
                opacity: 0.4;
                transform: scale(1) rotate(0deg);
            }

            50% {
                opacity: 0.9;
                transform: scale(1.2) rotate(15deg);
            }
        }

        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            padding: 28px 24px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(74, 144, 217, 0.2);
            border-radius: 28px;
            box-shadow: 0 8px 40px rgba(74, 144, 217, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            animation: slideUp 0.6s cubic-bezier(.22, .68, 0, 1.2);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Role toggle pill */
        .role-toggle {
            display: flex;
            background: rgba(74, 144, 217, 0.1);
            border: 1px solid rgba(74, 144, 217, 0.25);
            border-radius: 50px;
            padding: 5px;
            margin-bottom: 22px;
        }

        .role-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            color: rgba(74, 144, 217, 0.55);
        }

        .role-btn.active {
            background: rgba(74, 144, 217, 0.2);
            color: #2563eb;
            box-shadow: 0 0 20px rgba(74, 144, 217, 0.2);
            border: 1px solid rgba(74, 144, 217, 0.4);
        }

        /* Inputs */
        .input-wrap {
            position: relative;
            margin-bottom: 14px;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.55;
            font-size: 15px;
            pointer-events: none;
        }

        .input-wrap input {
            width: 100%;
            padding: 13px 16px 13px 44px;
            background: rgba(74, 144, 217, 0.06);
            border: 1px solid rgba(74, 144, 217, 0.2);
            border-radius: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: #1a2340;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-wrap input::placeholder {
            color: rgba(74, 144, 217, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 11px;
        }

        .input-wrap input:focus {
            border-color: rgba(74, 144, 217, 0.6);
            background: rgba(74, 144, 217, 0.1);
            box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.12);
        }

        .eye-btn {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            opacity: 0.5;
            font-size: 15px;
            color: #4a90d9;
            transition: opacity 0.2s;
        }

        .eye-btn:hover {
            opacity: 0.9;
        }

        /* Create Account Button */
        .btn-primary {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            background: linear-gradient(90deg, #4a90d9 0%, #2563eb 100%);
            color: white;
            box-shadow: 0 4px 24px rgba(74, 144, 217, 0.35);
            transition: all 0.3s ease;
            margin-top: 6px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(74, 144, 217, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Secondary button */
        .btn-secondary {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(74, 144, 217, 0.3);
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            background: rgba(74, 144, 217, 0.08);
            color: #4a90d9;
            transition: all 0.2s;
            margin-top: 10px;
            letter-spacing: 0.05em;
        }

        .btn-secondary:hover {
            background: rgba(74, 144, 217, 0.15);
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Sign-in row */
        .signin-row {
            text-align: center;
            margin-top: 18px;
            font-size: 13px;
            color: rgba(26, 35, 64, 0.55);
        }

        .signin-row a {
            color: #2563eb;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }

        .signin-row a:hover {
            color: #4a90d9;
        }

        /* Error */
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #dc2626;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 12px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        /* Verify section */
        #verifySection {
            display: none;
        }

        .verify-text {
            text-align: center;
            font-size: 13px;
            color: rgba(26, 35, 64, 0.7);
            margin-bottom: 20px;
            line-height: 1.7;
        }

        .verify-text b {
            color: #2563eb;
        }

        /* Verification code input - override uppercase for 6-digit */
        #verificationCode {
            text-align: center !important;
            letter-spacing: 6px !important;
            font-size: 18px !important;
            font-weight: 700 !important;
            text-transform: none !important;
        }
    </style>
</head>

<body>
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

    <div class="card">
        <!-- Role toggle -->
        <div class="role-toggle" id="roleToggle">
            <button class="role-btn active" id="btnCandidate" onclick="selectRole('candidate')">Student</button>
            <button class="role-btn" id="btnRecruiter" onclick="selectRole('recruiter')">Recruiter</button>
        </div>

        <!-- Error -->
        <div class="error-msg" id="errorMsg"></div>

        <!-- Signup Form -->
        <div id="signupSection">
            <form id="signupForm" onsubmit="handleSignup(event)">
                <div class="input-wrap">
                    <span class="input-icon">👤</span>
                    <input type="text" id="name" placeholder="Full Name" required autocomplete="name">
                </div>
                <div class="input-wrap">
                    <span class="input-icon">✉️</span>
                    <input type="email" id="email" placeholder="Email" required autocomplete="email">
                </div>
                <div class="input-wrap">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" placeholder="Password" required autocomplete="new-password">
                    <button type="button" class="eye-btn" onclick="togglePwd()" id="eyeBtn">👁</button>
                </div>
                <button type="submit" class="btn-primary" id="createBtn">Create Account</button>
            </form>
            <div class="signin-row">Already have an account? <a href="/smart_resume_signin_page.html">Sign In</a></div>
        </div>

        <!-- Verify Section -->
        <div id="verifySection">
            <div class="verify-text">
                We've sent a verification code to<br>
                <b id="verifyEmailDisplay"></b><br>
                Please enter it below to verify your email.
            </div>
            <form id="verifyForm" onsubmit="handleVerify(event)">
                <div class="input-wrap">
                    <span class="input-icon">🔑</span>
                    <input type="text" id="verificationCode" placeholder="000000" required maxlength="6">
                </div>
                <button type="submit" class="btn-primary" id="verifyBtn">Verify Email</button>
                <button type="button" class="btn-secondary" id="resendBtn" onclick="resendCode()">Resend Code</button>
            </form>
        </div>
    </div>

    <svg class="sparkle" viewBox="0 0 24 24" fill="rgba(74,144,217,0.7)" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2l2.09 6.26L20 10l-5.91 1.74L12 18l-2.09-6.26L4 10l5.91-1.74z" />
    </svg>

    <script>
        const API_BASE_URL = 'https://api.talentsynctech.in';
        let selectedRole = 'candidate';
        let registeredEmail = '';

        // Pre-select role from URL param
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('role') === 'recruiter') selectRole('recruiter');

        function selectRole(role) {
            selectedRole = role;
            document.getElementById('btnCandidate').classList.toggle('active', role === 'candidate');
            document.getElementById('btnRecruiter').classList.toggle('active', role === 'recruiter');
        }

        function togglePwd() {
            const pwd = document.getElementById('password');
            const btn = document.getElementById('eyeBtn');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
            btn.textContent = pwd.type === 'password' ? '👁' : '🙈';
        }

        function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.classList.add('show'); }
        function clearError() { document.getElementById('errorMsg').classList.remove('show'); }

        async function handleSignup(e) {
            e.preventDefault();
            clearError();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('createBtn');
            btn.disabled = true; btn.textContent = 'Creating account…';
            try {
                const r = await fetch(`${API_BASE_URL}/api/auth/signup`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, role: selectedRole === 'candidate' ? 'ROLE_USER' : 'ROLE_RECRUITER' })
                });
                const data = await r.json();
                if (!r.ok) throw new Error(data.error || 'Signup failed');
                registeredEmail = email;
                document.getElementById('verifyEmailDisplay').textContent = email;
                document.getElementById('signupSection').style.display = 'none';
                document.getElementById('roleToggle').style.display = 'none';
                document.getElementById('verifySection').style.display = 'block';
                alert('Account created! Check your email for the verification code.');
            } catch (err) {
                showError(err.message);
                btn.disabled = false; btn.textContent = 'Create Account';
            }
        }

        async function handleVerify(e) {
            e.preventDefault();
            clearError();
            const code = document.getElementById('verificationCode').value;
            const btn = document.getElementById('verifyBtn');
            btn.disabled = true; btn.textContent = 'Verifying…';
            try {
                const r = await fetch(`${API_BASE_URL}/api/auth/verify`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: registeredEmail, code })
                });
                const data = await r.json();
                if (!r.ok) throw new Error(data.error || 'Verification failed');
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify({ name: data.name, email: registeredEmail, role: data.role }));
                alert('Email verified! Welcome to TalentSync!');
                window.location.href = data.role === 'candidate' ? '/candidate-dashboard.html' : '/recruiter-dashboard.html';
            } catch (err) {
                showError(err.message);
                btn.disabled = false; btn.textContent = 'Verify Email';
            }
        }

        async function resendCode() {
            const btn = document.getElementById('resendBtn');
            btn.disabled = true; btn.textContent = 'Sending…';
            try {
                const r = await fetch(`${API_BASE_URL}/api/auth/resend-code`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: registeredEmail })
                });
                const data = await r.json();
                if (!r.ok) throw new Error(data.error || 'Failed to resend');
                alert('Verification code resent!');
            } catch (err) { alert('Error: ' + err.message); }
            btn.disabled = false; btn.textContent = 'Resend Code';
        }
    </script>
</body>

</html>
