<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Dashboard - TalentSync</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg1: #0d1b3e;
            --bg2: #0a3d62;
            --accent: #00d4aa;
            --accent2: #2563eb;
            --glass: rgba(255, 255, 255, 0.07);
            --gb: rgba(255, 255, 255, 0.15);
            --ghov: rgba(255, 255, 255, 0.12);
            --text: #f1f5f9;
            --muted: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bg1), var(--bg2));
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden
        }

        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.2;
            pointer-events: none;
            animation: fl 20s infinite ease-in-out
        }

        .b1 {
            width: 500px;
            height: 500px;
            background: #1e40af;
            top: -100px;
            left: -100px
        }

        .b2 {
            width: 400px;
            height: 400px;
            background: #00d4aa;
            bottom: -100px;
            right: -100px;
            animation-delay: 7s
        }

        .b3 {
            width: 300px;
            height: 300px;
            background: #2563eb;
            top: 40%;
            left: 40%;
            animation-delay: 14s
        }

        @keyframes fl {

            0%,
            100% {
                transform: translate(0, 0)
            }

            33% {
                transform: translate(25px, -25px)
            }

            66% {
                transform: translate(-15px, 15px)
            }
        }

        .header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--gb);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100
        }

        .logo {
            font-size: 22px;
            font-weight: 700
        }

        .logo span {
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .layout {
            display: flex;
            min-height: calc(100vh - 64px)
        }

        .sidebar {
            width: 210px;
            background: rgba(255, 255, 255, 0.04);
            border-right: 1px solid var(--gb);
            padding: 1.5rem 1rem;
            flex-shrink: 0
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--muted);
            transition: all 0.3s;
            margin-bottom: 0.25rem;
            border: 1px solid transparent;
            background: none;
            width: 100%;
            text-align: left;
            font-family: 'Poppins', sans-serif
        }

        .nav-item:hover,
        .nav-item.active {
            background: var(--glass);
            color: var(--text);
            border-color: var(--gb)
        }

        .nav-item.active {
            color: var(--accent)
        }

        .main {
            flex: 1;
            padding: 2rem;
            overflow-y: auto
        }

        .page-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 0.25rem
        }

        .page-sub {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 1.75rem
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--gb);
            border-radius: 18px;
            padding: 1.5rem;
            transition: all 0.3s
        }

        .card:hover {
            background: var(--ghov);
            transform: translateY(-2px)
        }

        .stat-val {
            font-size: 34px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center
        }

        .stat-lbl {
            font-size: 12px;
            color: var(--muted);
            text-align: center;
            margin-top: 0.25rem
        }

        .app-card {
            background: var(--glass);
            border: 1px solid var(--gb);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.3s
        }

        .app-card:hover {
            background: var(--ghov)
        }

        .badge {
            padding: 0.2rem 0.7rem;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 500
        }

        .bc {
            background: rgba(0, 212, 170, 0.15);
            color: var(--accent);
            border: 1px solid rgba(0, 212, 170, 0.3)
        }

        .bb {
            background: rgba(37, 99, 235, 0.15);
            color: #60a5fa;
            border: 1px solid rgba(37, 99, 235, 0.3)
        }

        .bs {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3)
        }

        .bw {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.3)
        }

        .bd {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3)
        }

        .bg {
            background: rgba(148, 163, 184, 0.15);
            color: var(--muted);
            border: 1px solid rgba(148, 163, 184, 0.3)
        }

        .btn {
            padding: 0.45rem 0.9rem;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s
        }

        .btn-p {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white
        }

        .btn-p:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(0, 212, 170, 0.3)
        }

        .btn-o {
            background: var(--glass);
            border: 1px solid var(--gb);
            color: var(--text)
        }

        .btn-o:hover {
            background: var(--ghov)
        }

        .btn-logout {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 0.4rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            font-weight: 500
        }

        /* Score circle */
        .sc {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 700;
            border: 3px solid;
            flex-shrink: 0
        }

        /* Pipeline */
        .pipeline {
            display: flex;
            align-items: center;
            gap: 0;
            margin: 1rem 0;
            overflow-x: auto;
            padding-bottom: 0.25rem
        }

        .pip-step {
            display: flex;
            align-items: center;
            gap: 0
        }

        .pip-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--muted);
            background: rgba(255, 255, 255, 0.04);
            flex-shrink: 0;
            transition: all 0.3s
        }

        .pip-dot.active {
            border-color: var(--accent);
            background: rgba(0, 212, 170, 0.15);
            color: var(--accent)
        }

        .pip-dot.done {
            border-color: rgba(0, 212, 170, 0.4);
            background: rgba(0, 212, 170, 0.08);
            color: rgba(0, 212, 170, 0.6)
        }

        .pip-dot.rejected {
            border-color: rgba(239, 68, 68, 0.5);
            background: rgba(239, 68, 68, 0.1);
            color: #f87171
        }

        .pip-label {
            font-size: 10px;
            color: var(--muted);
            text-align: center;
            margin-top: 0.3rem;
            white-space: nowrap
        }

        .pip-step-w {
            display: flex;
            flex-direction: column;
            align-items: center
        }

        .pip-line {
            width: 28px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            flex-shrink: 0
        }

        .pip-line.done {
            background: rgba(0, 212, 170, 0.3)
        }

        /* Skills gap */
        .skill-gap-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 0.9rem;
            background: rgba(239, 68, 68, 0.06);
            border: 1px solid rgba(239, 68, 68, 0.15);
            border-radius: 10px;
            margin-bottom: 0.5rem
        }

        .skill-gap-name {
            font-size: 13px;
            font-weight: 500;
            color: #f87171
        }

        .learn-link {
            font-size: 12px;
            color: #60a5fa;
            text-decoration: none;
            background: rgba(37, 99, 235, 0.1);
            border: 1px solid rgba(37, 99, 235, 0.25);
            border-radius: 6px;
            padding: 0.2rem 0.6rem;
            transition: all 0.3s
        }

        .learn-link:hover {
            background: rgba(37, 99, 235, 0.25)
        }

        .user-badge {
            background: var(--glass);
            border: 1px solid var(--gb);
            border-radius: 50px;
            padding: 0.4rem 1rem;
            font-size: 14px;
            font-weight: 500
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 0.75rem
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--muted)
        }

        .spin {
            display: inline-block;
            animation: spin 1s linear infinite
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        @media(max-width:768px) {
            .sidebar {
                display: none
            }

            .stats {
                grid-template-columns: repeat(2, 1fr)
            }
        }
    </style>
</head>

<body>
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>

    <div class="header">
        <div class="logo">Talent<span>Sync</span></div>
        <div class="user-area">
            <div class="user-badge">👋 <span id="userName">…</span></div>
            <button class="btn btn-o" style="font-size:13px" onclick="location.href='/profile.html'">👤 Profile</button>
            <button class="btn-logout" onclick="logout()">Sign Out</button>
        </div>
    </div>

    <div class="layout">
        <div class="sidebar">
            <button class="nav-item active" onclick="showSection('apps')">📋 Applications</button>
            <button class="nav-item" onclick="showSection('jobs')">🔍 Browse Jobs</button>
            <button class="nav-item" onclick="location.href='/profile.html'">👤 My Profile</button>
        </div>

        <div class="main">
            <!-- Applications -->
            <div id="sec-apps">
                <div class="page-title">My Applications</div>
                <div class="page-sub">Track your application pipeline and scores</div>
                <div class="stats">
                    <div class="card">
                        <div class="stat-val" id="st-total">0</div>
                        <div class="stat-lbl">Total Applied</div>
                    </div>
                    <div class="card">
                        <div class="stat-val" id="st-review">0</div>
                        <div class="stat-lbl">Under Review</div>
                    </div>
                    <div class="card">
                        <div class="stat-val" id="st-short">0</div>
                        <div class="stat-lbl">Shortlisted</div>
                    </div>
                    <div class="card">
                        <div class="stat-val" id="st-offer">0</div>
                        <div class="stat-lbl">Offers</div>
                    </div>
                </div>
                <div id="apps-list">
                    <div class="loading"><span class="spin">⏳</span> Loading…</div>
                </div>
            </div>

            <!-- Browse Jobs -->
            <div id="sec-jobs" style="display:none">
                <div class="page-title">🔍 Browse Jobs</div>
                <div class="page-sub">Find your next opportunity</div>
                <div id="jobs-list">
                    <div class="loading"><span class="spin">⏳</span> Loading…</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://api.talentsynctech.in';
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!token || user.role === 'recruiter') { location.href = '/smart_resume_signin_page.html'; }
        document.getElementById('userName').textContent = user.name || 'Candidate';

        function logout() { localStorage.clear(); location.href = '/smart_resume_signin_page.html'; }

        const sections = ['apps', 'jobs'];
        function showSection(n) {
            sections.forEach(s => document.getElementById('sec-' + s).style.display = s === n ? 'block' : 'none');
            document.querySelectorAll('.nav-item').forEach((el, i) => el.classList.toggle('active', sections[i] === n));
            if (n === 'jobs') loadJobs();
        }

        function statusBadge(s) {
            const m = {
                PENDING: ['bg', '⏳ Pending'], UNDER_REVIEW: ['bb', '🔍 Under Review'], SHORTLISTED: ['bc', '⭐ Shortlisted'],
                INTERVIEW: ['bs', '📅 Interview'], OFFERED: ['bw', '🎉 Offered'], REJECTED: ['bd', '❌ Rejected'], ATS_REJECTED: ['bd', '🤖 ATS Filtered']
            };
            const [c, l] = m[s] || ['bg', s]; return `<span class="badge ${c}">${l}</span>`;
        }

        const PIPELINE_STAGES = [
            { key: 'ATS', label: 'ATS', statuses: ['PENDING', 'ATS_REJECTED', 'UNDER_REVIEW', 'SHORTLISTED', 'INTERVIEW', 'OFFERED', 'REJECTED'] },
            { key: 'UNDER_REVIEW', label: 'Review' },
            { key: 'SHORTLISTED', label: 'Shortlist' },
            { key: 'INTERVIEW', label: 'Interview' },
            { key: 'OFFERED', label: 'Offered' }
        ];

        function stageIndex(status) {
            const map = { PENDING: 0, ATS_REJECTED: -1, UNDER_REVIEW: 1, SHORTLISTED: 2, INTERVIEW: 3, OFFERED: 4, REJECTED: -1 };
            return map[status] ?? 0;
        }

        function renderPipeline(status) {
            const labels = ['ATS', 'Review', 'Shortlist', 'Interview', 'Offered'];
            const keys = ['UNDER_REVIEW', 'UNDER_REVIEW', 'SHORTLISTED', 'INTERVIEW', 'OFFERED'];
            const curIdx = stageIndex(status);
            const rejected = status === 'REJECTED' || status === 'ATS_REJECTED';
            return `<div class="pipeline">${labels.map((l, i) => {
                let cls = '';
                if (rejected) cls = 'rejected';
                else if (i < curIdx) cls = 'done';
                else if (i === curIdx) cls = 'active';
                const line = i < labels.length - 1 ? `<div class="pip-line${i < curIdx && !rejected ? ' done' : ''}"></div>` : '';
                return `<div class="pip-step-w">
      <div class="pip-dot ${cls}">${cls === 'done' ? '✓' : cls === 'active' ? '●' : i === labels.length - 1 && status === 'OFFERED' ? '🎉' : '○'}</div>
      <div class="pip-label">${l}</div>
    </div>${line}`;
            }).join('')}</div>`;
        }

        function scoreCircle(score) {
            if (score === null || score === undefined) return '<div style="width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);border:3px solid rgba(255,255,255,0.15)"><span style="text-align:center;line-height:1.2">No<br>Score</span></div>';
            const c = score >= 70 ? '#10b981' : score >= 50 ? '#f59e0b' : '#ef4444';
            return `<div class="sc" style="border-color:${c};color:${c}">${score.toFixed(0)}%</div>`;
        }

        function getCourseSuggestion(skill) {
            const sk = skill.toLowerCase();
            if (sk.includes('python')) return 'https://www.coursera.org/learn/python';
            if (sk.includes('react') || sk.includes('javascript') || sk.includes('js')) return 'https://www.freecodecamp.org/learn/javascript-algorithms-and-data-structures/';
            if (sk.includes('java')) return 'https://www.codecademy.com/learn/learn-java';
            if (sk.includes('sql')) return 'https://www.w3schools.com/sql/';
            if (sk.includes('aws')) return 'https://aws.amazon.com/training/';
            if (sk.includes('docker') || sk.includes('kubernetes')) return 'https://www.docker.com/101-tutorial/';
            if (sk.includes('machine learning') || sk.includes('ml') || sk.includes('ai')) return 'https://www.coursera.org/learn/machine-learning';
            if (sk.includes('spring')) return 'https://spring.io/guides';
            if (sk.includes('node')) return 'https://nodejs.dev/learn';
            return `https://www.google.com/search?q=learn+${encodeURIComponent(skill)}+course+free`;
        }

        async function reAnalyze(appId, btn) {
            btn.textContent = '⏳ Analyzing…'; btn.disabled = true;
            try {
                const r = await fetch(`${API}/api/applications/${appId}/reanalyze`, {
                    method: 'POST', headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!r.ok) throw new Error('Failed');
                loadApplications(); // refresh
            } catch (e) { alert('Re-analysis failed: ' + e.message); }
            btn.textContent = '🔄 Re-run ATS'; btn.disabled = false;
        }

        async function loadApplications() {
            const el = document.getElementById('apps-list');
            try {
                const r = await fetch(`${API}/api/applications/my-applications`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (!r.ok) throw new Error('Failed');
                const apps = await r.json();
                document.getElementById('st-total').textContent = apps.length;
                document.getElementById('st-review').textContent = apps.filter(a => ['UNDER_REVIEW', 'SHORTLISTED'].includes(a.status)).length;
                document.getElementById('st-short').textContent = apps.filter(a => a.status === 'SHORTLISTED').length;
                document.getElementById('st-offer').textContent = apps.filter(a => a.status === 'OFFERED').length;
                if (!apps.length) { el.innerHTML = '<p style="text-align:center;color:var(--muted);padding:3rem">No applications yet. Browse jobs to apply!</p>'; return; }
                el.innerHTML = apps.map(a => {
                    const atsRejected = a.status === 'ATS_REJECTED';
                    const skillsSection = a.skillsGap && a.skillsGap.length ? `
        <div style="margin-top:1rem;padding:1rem;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.15);border-radius:12px">
          <div style="font-size:13px;font-weight:700;color:#f87171;margin-bottom:0.75rem">🎯 Skills to Improve (${a.skillsGap.length} identified)</div>
          ${a.skillsGap.map(s => `<div class="skill-gap-item">
            <span class="skill-gap-name">📌 ${s}</span>
            <a href="${getCourseSuggestion(s)}" target="_blank" rel="noopener" class="learn-link">📚 Learn</a>
          </div>`).join('')}
        </div>`: '';

                    const notesHistory = a.notesHistory && a.notesHistory.length ? `
        <div style="margin-top:0.75rem;padding:0.75rem;background:rgba(255,255,255,0.04);border-radius:10px;border:1px solid rgba(255,255,255,0.08)">
          <div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:0.5rem">💬 Recruiter Notes</div>
          ${a.notesHistory.map(n => `<div style="display:flex;gap:0.5rem;margin-bottom:0.4rem;font-size:12px">
            <span style="color:var(--muted);white-space:nowrap">${new Date(n.timestamp).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' })}</span>
            <span style="color:var(--text)">${n.text}</span>
            <span class="badge bg" style="margin-left:auto">${n.status}</span>
          </div>`).join('')}
        </div>`: '';

                    return `<div class="app-card" style="${atsRejected ? 'opacity:0.75;border-color:rgba(239,68,68,0.25)' : ''}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap">
          <div style="flex:1">
            <div style="font-size:16px;font-weight:700;margin-bottom:0.25rem">${a.jobTitle || 'Job Application'}</div>
            <div style="color:var(--muted);font-size:13px;margin-bottom:0.75rem">${a.jobCompany || ''} • Applied ${new Date(a.appliedAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}</div>
            <div style="display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center">
              ${statusBadge(a.status)}
              ${a.reAnalyzedAt ? `<span style="font-size:11px;color:var(--muted)">Re-analyzed ${new Date(a.reAnalyzedAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' })}</span>` : ''}
              ${a.interviewDateTime ? `<span class="badge bs">📅 Interview: ${new Date(a.interviewDateTime).toLocaleString('en-IN', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })}</span>` : ''}
            </div>
          </div>
          ${scoreCircle(a.matchScore)}
        </div>
        ${renderPipeline(a.status)}
        ${skillsSection}
        ${notesHistory}
        <div style="display:flex;gap:0.5rem;margin-top:1rem;flex-wrap:wrap">
          ${a.status === 'PENDING' || a.status === 'ATS_REJECTED' ? `<button class="btn btn-o" style="font-size:12px" onclick="reAnalyze('${a.id}',this)">🔄 Re-run ATS</button>` : ''}
          <button class="btn btn-o" style="font-size:12px;color:#f87171;border-color:rgba(239,68,68,0.3)" onclick="withdraw('${a.id}')">✕ Withdraw</button>
        </div>
      </div>`;
                }).join('');
            } catch (e) { el.innerHTML = '<p style="text-align:center;color:var(--danger)">Failed to load applications</p>'; }
        }

        async function loadJobs() {
            const el = document.getElementById('jobs-list');
            try {
                const r = await fetch(`${API}/api/jobs`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (!r.ok) throw new Error('Failed');
                const jobs = await r.json();
                if (!jobs.length) { el.innerHTML = '<p style="text-align:center;color:var(--muted);padding:2rem">No jobs available right now</p>'; return; }
                el.innerHTML = jobs.map(j => `<div class="app-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem">
        <div style="flex:1">
          <div style="font-size:15px;font-weight:700;margin-bottom:0.25rem">${j.title}</div>
          <div style="color:var(--muted);font-size:13px;margin-bottom:0.75rem">${j.company || ''}</div>
          <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
            ${j.location ? `<span class="badge bc">📍 ${j.location}</span>` : ''}
            ${j.type ? `<span class="badge bb">${j.type}</span>` : ''}
            ${j.salary ? `<span class="badge bs">💰 ${j.salary}</span>` : ''}
            ${j.expiresAt ? `<span class="badge bw">⏰ Closes ${new Date(j.expiresAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' })}</span>` : ''}
          </div>
        </div>
        <button class="btn btn-p" onclick="applyToJob('${j.id}',this)">Apply Now →</button>
      </div>
      ${j.description ? `<div style="margin-top:0.75rem;font-size:13px;color:var(--muted);line-height:1.6">${j.description.substring(0, 200)}${j.description.length > 200 ? '…' : ''}</div>` : ''}
    </div>`).join('');
            } catch (e) { el.innerHTML = '<p style="text-align:center;color:var(--danger)">Failed to load jobs</p>'; }
        }

        async function applyToJob(jobId, btn) {
            btn.textContent = 'Applying…'; btn.disabled = true;
            try {
                const r = await fetch(`${API}/api/applications`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ jobId })
                });
                const d = await r.json();
                if (!r.ok) throw new Error(d.error || 'Failed');
                alert('✅ Applied! Our ATS is scoring your resume…');
                showSection('apps');
            } catch (e) { alert('❌ ' + e.message); }
            btn.textContent = 'Apply Now →'; btn.disabled = false;
        }

        async function withdraw(appId) {
            if (!confirm('Withdraw this application?')) return;
            try {
                const r = await fetch(`${API}/api/applications/${appId}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
                if (!r.ok) throw new Error('Failed');
                loadApplications();
            } catch (e) { alert('Failed: ' + e.message); }
        }

        loadApplications();
    </script>
</body>

</html>
