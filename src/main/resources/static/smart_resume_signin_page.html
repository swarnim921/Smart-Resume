<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentSync - Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #c8d8f0 0%, #d6e4f7 40%, #c2d8f5 100%);
            overflow: hidden;
            position: relative;
        }

        /* Animated blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            pointer-events: none;
            animation: blobFloat 18s ease-in-out infinite;
        }

        .blob1 {
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, #4a90d944, #2563eb33);
            top: -80px;
            left: -80px;
            animation-delay: 0s;
        }

        .blob2 {
            width: 380px;
            height: 380px;
            background: radial-gradient(circle, #3b82f644, #7c3aed33);
            bottom: -60px;
            right: -60px;
            animation-delay: 6s;
        }

        .blob3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #60a5fa33, #4a90d922);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 12s;
        }

        @keyframes blobFloat {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(40px, -40px) scale(1.08);
            }

            66% {
                transform: translate(-25px, 25px) scale(0.95);
            }
        }

        /* Sparkle */
        .sparkle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 28px;
            height: 28px;
            opacity: 0.6;
            animation: sparkleAnim 3s ease-in-out infinite;
        }

        @keyframes sparkleAnim {

            0%,
            100% {
                opacity: 0.4;
                transform: scale(1) rotate(0deg);
            }

            50% {
                opacity: 0.9;
                transform: scale(1.2) rotate(15deg);
            }
        }

        /* Main card */
        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            padding: 24px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(74, 144, 217, 0.2);
            border-radius: 28px;
            box-shadow: 0 8px 40px rgba(74, 144, 217, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            animation: slideUp 0.6s cubic-bezier(.22, .68, 0, 1.2);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Role toggle pill */
        .role-toggle {
            display: flex;
            background: rgba(74, 144, 217, 0.1);
            border: 1px solid rgba(74, 144, 217, 0.25);
            border-radius: 50px;
            padding: 5px;
            margin-bottom: 28px;
        }

        .role-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            color: rgba(74, 144, 217, 0.55);
        }

        .role-btn.active {
            background: rgba(74, 144, 217, 0.2);
            color: #2563eb;
            box-shadow: 0 0 20px rgba(74, 144, 217, 0.2);
            border: 1px solid rgba(74, 144, 217, 0.4);
        }

        /* Inputs */
        .input-wrap {
            position: relative;
            margin-bottom: 16px;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.55;
            font-size: 16px;
            pointer-events: none;
        }

        .input-wrap input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: rgba(74, 144, 217, 0.06);
            border: 1px solid rgba(74, 144, 217, 0.2);
            border-radius: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: #1a2340;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-wrap input::placeholder {
            color: rgba(74, 144, 217, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 12px;
        }

        .input-wrap input:focus {
            border-color: rgba(74, 144, 217, 0.6);
            background: rgba(74, 144, 217, 0.1);
            box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.12);
        }

        .eye-btn {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            opacity: 0.5;
            font-size: 16px;
            color: white;
            transition: opacity 0.2s;
        }

        .eye-btn:hover {
            opacity: 0.9;
        }

        /* Sign in button */
        .btn-signin {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            background: linear-gradient(90deg, #4a90d9 0%, #2563eb 100%);
            color: white;
            box-shadow: 0 4px 24px rgba(74, 144, 217, 0.35);
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .btn-signin:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(74, 144, 217, 0.5);
        }

        .btn-signin:active {
            transform: translateY(0);
        }

        .btn-signin:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Divider */
        .register-row {
            text-align: center;
            margin: 18px 0 14px;
            font-size: 13px;
            color: rgba(26, 35, 64, 0.55);
        }

        .register-row a {
            color: #2563eb;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }

        .register-row a:hover {
            color: #4a90d9;
        }

        /* Social buttons row */
        .social-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
        }

        .social-divider {
            width: 1px;
            height: 22px;
            background: rgba(74, 144, 217, 0.2);
        }

        .btn-social {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border: none;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: #1a2340;
            background: rgba(74, 144, 217, 0.08);
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid rgba(74, 144, 217, 0.18);
        }

        .btn-social:hover {
            background: rgba(74, 144, 217, 0.15);
            color: #2563eb;
            transform: translateY(-1px);
        }

        .btn-social svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        /* Error */
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #dc2626;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 14px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }
    </style>
</head>

<body>
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

    <div class="card">
        <!-- Role toggle -->
        <div class="role-toggle">
            <button class="role-btn active" id="btnCandidate" onclick="selectRole('candidate')">Candidate</button>
            <button class="role-btn" id="btnRecruiter" onclick="selectRole('recruiter')">Recruiter</button>
        </div>

        <!-- Error -->
        <div class="error-msg" id="errorMsg"></div>

        <!-- Form -->
        <form id="signInForm" onsubmit="handleSignIn(event)">
            <div class="input-wrap">
                <span class="input-icon">🎓</span>
                <input type="email" id="email" placeholder="Email" required autocomplete="email">
            </div>
            <div class="input-wrap">
                <span class="input-icon">🔒</span>
                <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
                <button type="button" class="eye-btn" onclick="togglePwd()" id="eyeBtn">👁</button>
            </div>
            <button type="submit" class="btn-signin" id="signInBtn">Sign In</button>
        </form>

        <!-- Register -->
        <div class="register-row">
            Don't have an account? <a href="#" id="registerLink">Register</a>
        </div>

        <!-- Social -->
        <div class="social-row">
            <button class="btn-social" onclick="signInWithGoogle()">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4" />
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853" />
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                        fill="#FBBC05" />
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335" />
                </svg>
                Sign in with Google
            </button>
            <div class="social-divider"></div>
            <button class="btn-social" onclick="signInWithLinkedIn()">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#0A66C2">
                    <path
                        d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" />
                </svg>
                LinkedIn
            </button>
        </div>
    </div>

    <!-- Sparkle -->
    <svg class="sparkle" viewBox="0 0 24 24" fill="rgba(74,144,217,0.7)" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2l2.09 6.26L20 10l-5.91 1.74L12 18l-2.09-6.26L4 10l5.91-1.74z" />
    </svg>

    <script>
        const API_BASE_URL = 'https://api.talentsynctech.in';
        let selectedRole = 'candidate';

        function selectRole(role) {
            selectedRole = role;
            document.getElementById('btnCandidate').classList.toggle('active', role === 'candidate');
            document.getElementById('btnRecruiter').classList.toggle('active', role === 'recruiter');
        }

        function togglePwd() {
            const pwd = document.getElementById('password');
            const btn = document.getElementById('eyeBtn');
            if (pwd.type === 'password') { pwd.type = 'text'; btn.textContent = '🙈'; }
            else { pwd.type = 'password'; btn.textContent = '👁'; }
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('show');
        }
        function clearError() { document.getElementById('errorMsg').classList.remove('show'); }

        async function handleSignIn(e) {
            e.preventDefault();
            clearError();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('signInBtn');
            btn.disabled = true; btn.textContent = 'Signing in…';
            try {
                const r = await fetch(`${API_BASE_URL}/api/auth/signin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                if (!r.ok) throw new Error('Invalid email or password');
                const data = await r.json();
                const backendRole = data.role === 'user' ? 'candidate' : data.role;
                if (selectedRole !== backendRole) {
                    throw new Error(`This account is registered as ${backendRole}. Please select the correct role.`);
                }
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify({ name: data.name, email: data.email, role: backendRole }));
                window.location.href = backendRole === 'recruiter' ? '/recruiter-dashboard.html' : '/candidate-dashboard.html';
            } catch (err) {
                showError(err.message);
                btn.disabled = false; btn.textContent = 'Sign In';
            }
        }

        function signInWithGoogle() {
            const role = selectedRole || 'candidate';
            document.cookie = `oauth_role=${role};path=/;max-age=600;SameSite=Lax`;
            window.location.href = 'https://api.talentsynctech.in/oauth2/authorization/google';
        }

        function signInWithLinkedIn() {
            alert('LinkedIn SSO coming soon!');
        }

        // Handle OAuth callback
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('token')) {
            const token = urlParams.get('token');
            const name = urlParams.get('name');
            const email = urlParams.get('email');
            const role = urlParams.get('role');
            localStorage.setItem('token', token);
            localStorage.setItem('user', JSON.stringify({ name, email, role }));
            window.location.href = role === 'recruiter' ? '/recruiter-dashboard.html' : '/candidate-dashboard.html';
        }

        // Register link
        document.getElementById('registerLink').addEventListener('click', function (e) {
            e.preventDefault();
            window.location.href = `/signup.html?role=${selectedRole}`;
        });

        // Already logged in
        window.addEventListener('load', function () {
            const token = localStorage.getItem('token');
            if (token) {
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                if (confirm(`Already signed in as ${user.name}. Go to dashboard?`)) {
                    window.location.href = user.role === 'recruiter' ? '/recruiter-dashboard.html' : '/candidate-dashboard.html';
                }
            }
        });
    </script>
</body>

</html>
