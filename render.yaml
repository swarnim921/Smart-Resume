services:
  # ─── Spring Boot Backend ──────────────────────────────────────────
  - type: web
    name: talentsync-backend
    runtime: docker
    rootDir: .
    plan: free
    envVars:
      - key: MONGODB_URI
        sync: false          # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false          # Example: noreply@talentsynctech.in
      - key: ML_SERVICE_URL
        sync: false          # URL of your deployed ML service

  # ─── Python ML Service ───────────────────────────────────────────
  - type: web
    name: talentsync-ml
    runtime: python
    rootDir: ml-service
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 5000
